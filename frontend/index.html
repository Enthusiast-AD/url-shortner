<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>URL Shortener</h1>
            <p class="tagline">Paste a long URL and get a short one</p>
        </header>

        <main>
            <!-- Shorten Form -->
            <form id="shorten-form">
                <div class="input-group">
                    <input 
                        type="url" 
                        id="url-input" 
                        placeholder="https://example.com/very/long/url/that/needs/shortening"
                        required
                        autocomplete="off"
                    >
                    <button type="submit" id="shorten-btn">Shorten</button>
                </div>
                <p id="error-msg" class="error hidden"></p>
            </form>

            <!-- Result -->
            <div id="result" class="result-box hidden">
                <p class="result-label">Your shortened URL:</p>
                <div class="result-row">
                    <a id="short-url" href="#" target="_blank" rel="noopener noreferrer"></a>
                    <button id="copy-btn" class="copy-btn" title="Copy to clipboard">Copy</button>
                </div>
                <p id="copy-feedback" class="copy-feedback hidden">Copied!</p>
            </div>

            <!-- History -->
            <section id="history-section" class="hidden">
                <h2>Recent URLs</h2>
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Short URL</th>
                            <th>Original URL</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>Built with Express, MongoDB &amp; Snowflake IDs</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
